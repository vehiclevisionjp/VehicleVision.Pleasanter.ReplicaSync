name: Create Release

on:
  workflow_dispatch:
    inputs:
      version_type:
        description: "バージョンアップの種類"
        required: true
        default: "patch"
        type: choice
        options:
          - patch # 1.0.0 → 1.0.1
          - minor # 1.0.0 → 1.1.0
          - major # 1.0.0 → 2.0.0

jobs:
  release:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.x"

      - name: Get current version
        id: get_version
        run: |
          CURRENT_VERSION=$(grep -oP '(?<=<Version>)[^<]+' Directory.Build.props)
          echo "current_version=$CURRENT_VERSION" >> $GITHUB_OUTPUT
          echo "Current version: $CURRENT_VERSION"

      - name: Calculate new version
        id: new_version
        run: |
          CURRENT="${{ steps.get_version.outputs.current_version }}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"

          case "${{ github.event.inputs.version_type }}" in
            major)
              MAJOR=$((MAJOR + 1))
              MINOR=0
              PATCH=0
              ;;
            minor)
              MINOR=$((MINOR + 1))
              PATCH=0
              ;;
            patch)
              PATCH=$((PATCH + 1))
              ;;
          esac

          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "New version: $NEW_VERSION"

      - name: Update version in csproj
        run: |
          sed -i 's|<Version>${{ steps.get_version.outputs.current_version }}</Version>|<Version>${{ steps.new_version.outputs.new_version }}</Version>|' Directory.Build.props

      - name: Build project
        run: dotnet build --configuration Release

      - name: Run tests
        run: dotnet test --no-build --configuration Release --verbosity normal --filter "FullyQualifiedName!~E2E"

      - name: Create NuGet package
        run: dotnet pack --configuration Release --no-build --output ./artifacts/nupkg

      - name: Publish Web
        run: dotnet publish src/VehicleVision.Pleasanter.ReplicaSync.Web/VehicleVision.Pleasanter.ReplicaSync.Web.csproj --configuration Release --no-build --output ./artifacts/publish/web

      - name: Publish Worker
        run: dotnet publish src/VehicleVision.Pleasanter.ReplicaSync.Worker/VehicleVision.Pleasanter.ReplicaSync.Worker.csproj --configuration Release --no-build --output ./artifacts/publish/worker

      - name: Publish Desktop (Windows x64)
        run: dotnet publish src/VehicleVision.Pleasanter.ReplicaSync.Desktop/VehicleVision.Pleasanter.ReplicaSync.Desktop.csproj --configuration Release --runtime win-x64 --self-contained --output ./artifacts/publish/desktop-win-x64

      - name: Publish Desktop (Linux x64)
        run: dotnet publish src/VehicleVision.Pleasanter.ReplicaSync.Desktop/VehicleVision.Pleasanter.ReplicaSync.Desktop.csproj --configuration Release --runtime linux-x64 --self-contained --output ./artifacts/publish/desktop-linux-x64

      - name: Publish Desktop (macOS x64)
        run: dotnet publish src/VehicleVision.Pleasanter.ReplicaSync.Desktop/VehicleVision.Pleasanter.ReplicaSync.Desktop.csproj --configuration Release --runtime osx-x64 --self-contained --output ./artifacts/publish/desktop-osx-x64

      - name: Publish Desktop (macOS ARM64)
        run: dotnet publish src/VehicleVision.Pleasanter.ReplicaSync.Desktop/VehicleVision.Pleasanter.ReplicaSync.Desktop.csproj --configuration Release --runtime osx-arm64 --self-contained --output ./artifacts/publish/desktop-osx-arm64

      - name: Create Release ZIP
        run: |
          VERSION="v${{ steps.new_version.outputs.new_version }}"
          REPO="${{ github.event.repository.name }}"
          DIST="$(pwd)/artifacts/dist"
          mkdir -p "$DIST"

          create_zip() {
            local name=$1 src=$2
            local staging="$(pwd)/artifacts/staging/${name}"
            mkdir -p "$staging"
            cp -r ${src}/* "$staging/"
            cp README.md LICENSE "$staging/"
            if [ -d "LICENSES" ]; then cp -r LICENSES "$staging/LICENSES"; fi
            (cd "$staging" && zip -r "${DIST}/${REPO}_${name}_${VERSION}.zip" ./*)
          }

          create_zip "Web" "./artifacts/publish/web"
          create_zip "Worker" "./artifacts/publish/worker"
          create_zip "Desktop_win-x64" "./artifacts/publish/desktop-win-x64"
          create_zip "Desktop_linux-x64" "./artifacts/publish/desktop-linux-x64"
          create_zip "Desktop_osx-x64" "./artifacts/publish/desktop-osx-x64"
          create_zip "Desktop_osx-arm64" "./artifacts/publish/desktop-osx-arm64"

      - name: Commit version update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: bump version to v${{ steps.new_version.outputs.new_version }}"
          git push

      - name: Create Git tag
        run: |
          git tag "Release_v${{ steps.new_version.outputs.new_version }}"
          git push origin "Release_v${{ steps.new_version.outputs.new_version }}"

      - name: Publish to NuGet.org
        run: dotnet nuget push ./artifacts/nupkg/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate

      - name: Publish to GitHub Packages
        run: dotnet nuget push ./artifacts/nupkg/*.nupkg --source "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json" --api-key ${{ secrets.GITHUB_TOKEN }} --skip-duplicate

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: Release_v${{ steps.new_version.outputs.new_version }}
          name: v${{ steps.new_version.outputs.new_version }}
          generate_release_notes: true
          files: |
            ./artifacts/dist/${{ github.event.repository.name }}_Web_v${{ steps.new_version.outputs.new_version }}.zip
            ./artifacts/dist/${{ github.event.repository.name }}_Worker_v${{ steps.new_version.outputs.new_version }}.zip
            ./artifacts/dist/${{ github.event.repository.name }}_Desktop_win-x64_v${{ steps.new_version.outputs.new_version }}.zip
            ./artifacts/dist/${{ github.event.repository.name }}_Desktop_linux-x64_v${{ steps.new_version.outputs.new_version }}.zip
            ./artifacts/dist/${{ github.event.repository.name }}_Desktop_osx-x64_v${{ steps.new_version.outputs.new_version }}.zip
            ./artifacts/dist/${{ github.event.repository.name }}_Desktop_osx-arm64_v${{ steps.new_version.outputs.new_version }}.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
